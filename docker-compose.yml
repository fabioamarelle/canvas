version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: canvas-mysql-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: Canvas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./canvas-mysql-database/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  backend:
    build: ./canvas-java-server
    container_name: canvas-java-server
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/Canvas?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password

  frontend:
    build: ./canvas-web-app
    container_name: canvas-web-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: